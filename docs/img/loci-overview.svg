<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="840" height="380">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B5CF6"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="840" height="380" fill="#F9FAFB" rx="12"/>
  <text x="420" y="32" text-anchor="middle" fill="#1F2937" font-size="16" font-weight="700">How Loci works with Claude Code</text>

  <!-- ── NODE 1: You ── -->
  <rect x="30" y="155" width="120" height="70" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="90" y="183" text-anchor="middle" font-size="22">🧑‍💻</text>
  <text x="90" y="202" text-anchor="middle" fill="#1E40AF" font-size="12" font-weight="600">You</text>
  <text x="90" y="218" text-anchor="middle" fill="#6B7280" font-size="10">ask a question</text>

  <!-- Arrow: You → Claude -->
  <path d="M 150 190 L 210 190" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#arr-b)"/>
  <text x="180" y="183" text-anchor="middle" fill="#6B7280" font-size="9">question</text>

  <!-- ── NODE 2: Claude Code ── -->
  <rect x="210" y="130" width="150" height="120" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="285" y="165" text-anchor="middle" font-size="22">🤖</text>
  <text x="285" y="184" text-anchor="middle" fill="#1E40AF" font-size="12" font-weight="700">Claude Code</text>
  <text x="285" y="200" text-anchor="middle" fill="#6B7280" font-size="10">"Have I seen this</text>
  <text x="285" y="214" text-anchor="middle" fill="#6B7280" font-size="10">before? Let me check</text>
  <text x="285" y="228" text-anchor="middle" fill="#6B7280" font-size="10">my memory..."</text>

  <!-- Arrow: Claude → Loci MCP (down-right) -->
  <path d="M 360 175 L 440 175" stroke="#8B5CF6" stroke-width="2" fill="none" marker-end="url(#arr-p)"/>
  <text x="400" y="168" text-anchor="middle" fill="#7C3AED" font-size="9">memory lookup</text>

  <!-- ── NODE 3: Loci MCP Server ── -->
  <rect x="440" y="100" width="170" height="150" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="525" y="133" text-anchor="middle" font-size="20">🧠</text>
  <text x="525" y="153" text-anchor="middle" fill="#5B21B6" font-size="12" font-weight="700">Loci MCP Server</text>
  <text x="525" y="170" text-anchor="middle" fill="#6B7280" font-size="10">25 memory tools</text>
  <line x1="460" y1="179" x2="590" y2="179" stroke="#DDD6FE" stroke-width="1"/>
  <text x="525" y="194" text-anchor="middle" fill="#7C3AED" font-size="9">• investigation tools</text>
  <text x="525" y="208" text-anchor="middle" fill="#7C3AED" font-size="9">• memory search &amp; save</text>
  <text x="525" y="222" text-anchor="middle" fill="#7C3AED" font-size="9">• claim validation</text>
  <text x="525" y="236" text-anchor="middle" fill="#7C3AED" font-size="9">• audit &amp; reflection</text>

  <!-- Arrow: Loci → Vector DB -->
  <path d="M 610 175 L 680 175" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arr-g)"/>
  <text x="645" y="168" text-anchor="middle" fill="#065F46" font-size="9">search</text>

  <!-- ── NODE 4: Vector DB ── -->
  <!-- Cylinder shape -->
  <ellipse cx="740" cy="165" rx="56" ry="15" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <rect x="684" y="165" width="112" height="70" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <ellipse cx="740" cy="235" rx="56" ry="15" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="740" y="193" text-anchor="middle" fill="#065F46" font-size="11" font-weight="700">Vector DB</text>
  <text x="740" y="210" text-anchor="middle" fill="#065F46" font-size="9">(Qdrant)</text>
  <text x="740" y="226" text-anchor="middle" fill="#065F46" font-size="9">+ SQLite</text>

  <!-- Arrow: DB → Loci (return — below) -->
  <path d="M 684 245 C 620 300 500 300 440 250" stroke="#10B981" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr-g)"/>
  <text x="580" y="318" text-anchor="middle" fill="#065F46" font-size="10">relevant memories returned</text>

  <!-- Arrow: Loci → Claude (return) -->
  <path d="M 440 225 L 365 225" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#arr-o)"/>
  <text x="402" y="240" text-anchor="middle" fill="#92400E" font-size="9">context injected</text>

  <!-- Arrow: Claude → You (answer) -->
  <path d="M 210 215 L 150 215" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arr-g)"/>
  <text x="180" y="230" text-anchor="middle" fill="#065F46" font-size="9">answer</text>

  <!-- ── LEGEND ── -->
  <rect x="30" y="310" width="780" height="56" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="50" y="330" fill="#1F2937" font-size="11" font-weight="600">Key insight:</text>
  <text x="50" y="348" fill="#6B7280" font-size="11">Claude doesn't store memory itself. Loci is the memory layer — a separate system Claude calls like any other tool.</text>
  <text x="50" y="362" fill="#6B7280" font-size="11">Your data never leaves your infrastructure (Qdrant and Ollama run locally or on your own servers).</text>
</svg>
